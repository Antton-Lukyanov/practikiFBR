<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <title>Мои заметки</title>
    
    <!-- Подключаем стили -->
    <link rel="stylesheet" href="/style.css">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Для Android -->
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Цвет темы для браузера -->
    <meta name="theme-color" content="#2d8c5a">
    
    <!-- Для iOS -->
    <link rel="apple-touch-icon" href="/icons/favicon-152x152.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- Обычная иконка вкладки -->
    <link rel="icon" href="/icons/favicon.ico" sizes="16x16" type="image/ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
</head>
<body>
    <div class="container">
        <header>
            <h1>Мои заметки</h1>
            <p class="subtitle">Приложение работает даже без интернета</p>
        </header>

        <div class="status-card">
            <div class="status-item">
                <span class="status-label">Статус:</span>
                <span id="onlineStatus" class="status-value online">Онлайн</span>
            </div>
            <div class="status-item">
                <span class="status-label">Service Worker:</span>
                <span id="swStatus" class="status-value">Проверка...</span>
            </div>
        </div>

        <form id="note-form">
            <div class="form-row">
                <input type="text" id="note-input" placeholder="Введите заметку..." required>
                <button type="submit" id="add-btn">Добавить</button>
            </div>
        </form>

        <div class="notes-header">
            <h2>Список заметок</h2>
            <button id="clear-all-btn" class="clear-btn">Очистить все</button>
        </div>

        <ul id="notes-list" class="notes-list">
            <li class="empty-message">Нет заметок. Добавьте первую!</li>
        </ul>

        <footer>
            <p>Работает офлайн | Данные хранятся в localStorage</p>
        </footer>
    </div>

    <script src="/app.js"></script>
</body>
</html>
