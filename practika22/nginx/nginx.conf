# Определяем группу backend-серверов
upstream backend_servers {
    # Алгоритм Round Robin (по умолчанию)
    server 127.0.0.1:3001 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:3002 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:3003 backup;  # Резервный сервер
    
    # Альтернативные алгоритмы (раскомментировать нужный):
    # least_conn;                     # Least Connections
    # ip_hash;                        # IP Hash
}

server {
    listen 80;
    
    location / {
        proxy_pass http://backend_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    location /health {
        proxy_pass http://backend_servers/health;
        access_log off;
    }
}