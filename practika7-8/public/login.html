<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
        .error { color: red; margin: 10px 0; }
        a { display: block; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Вход</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
        <div id="error" class="error"></div>
    </form>
    <a href="/register.html">Нет аккаунта? Зарегистрироваться</a>
    <a href="/">На главную</a>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    const result = await res.json();
                    // Сохраняем токен
                    localStorage.setItem('token', result.accessToken);
                    alert('Вход выполнен! Токен сохранен');
                    window.location.href = '/profile.html';
                } else {
                    const err = await res.json();
                    document.getElementById('error').textContent = err.error;
                }
            } catch (err) {
                document.getElementById('error').textContent = 'Ошибка соединения';
            }
        };
    </script>
</body>
</html>
