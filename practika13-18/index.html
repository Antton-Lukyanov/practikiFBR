<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2d8c5a">
    <link rel="apple-touch-icon" href="/icons/favicon-152x152.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Notes PWA</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="/icons/favicon.ico" sizes="16x16" type="image/ico">
</head>
<body>
    <div class="container">
        <header>
            <h1>My notes</h1>
            <p class="subtitle">PWA | Offline | Notifications | Snooze</p>
            <nav class="nav-buttons">
                <button id="home-btn" class="nav-btn active">Home</button>
                <button id="about-btn" class="nav-btn">About</button>
            </nav>
        </header>

        <div id="app-content">
            <div class="loading">Loading...</div>
        </div>

        <footer class="push-controls">
            <button id="enable-push" class="push-btn enable">Enable notifications</button>
            <button id="disable-push" class="push-btn disable" style="display:none;">Disable notifications</button>
        </footer>
    </div>

    <script src="/socket.io.min.js"></script>
    <script src="/config.js"></script>
    <script src="/app.js"></script>
</body>
</html>
